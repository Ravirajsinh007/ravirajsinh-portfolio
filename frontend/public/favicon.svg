<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Royal Cyber Gold to Flame Orange Gradient -->
    <linearGradient id="lion-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE259" />
      <stop offset="100%" stop-color="#FFA751" />
    </linearGradient>
    <!-- Deep Neon Accent Gradient -->
    <linearGradient id="glow-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
  </defs>
  
  <!-- Smooth Dark Premium Background Card -->
  <rect width="100" height="100" rx="24" fill="#0d0e12" />
  
  <!-- Subtle Outer Hexagonal/Geometric Border -->
  <polygon points="50,6 88,28 88,72 50,94 12,72 12,28" fill="none" stroke="url(#glow-grad)" stroke-width="2" stroke-opacity="0.3" />
  
  <!-- Stylized Geometric Lion Head -->
  <g id="lion-head" transform="translate(0, 3)">
    <!-- Main Mane - Back Outlines -->
    <polygon points="50,15 28,26 22,42 30,58 50,48" fill="url(#lion-grad)" opacity="0.15" />
    <polygon points="50,15 72,26 78,42 70,58 50,48" fill="url(#lion-grad)" opacity="0.15" />
    
    <!-- Outer Mane Wedges (Left) -->
    <polygon points="50,18 35,28 32,45" fill="url(#lion-grad)" opacity="0.4" />
    <polygon points="32,45 20,48 28,62" fill="url(#lion-grad)" opacity="0.5" />
    <polygon points="28,62 38,72 50,82" fill="url(#lion-grad)" opacity="0.3" />
    
    <!-- Outer Mane Wedges (Right) -->
    <polygon points="50,18 65,28 68,45" fill="url(#lion-grad)" opacity="0.5" />
    <polygon points="68,45 80,48 72,62" fill="url(#lion-grad)" opacity="0.4" />
    <polygon points="72,62 62,72 50,82" fill="url(#lion-grad)" opacity="0.6" />

    <!-- Forehead Structure -->
    <polygon points="50,18 42,35 50,48" fill="url(#lion-grad)" opacity="0.8" />
    <polygon points="50,18 58,35 50,48" fill="url(#lion-grad)" opacity="0.9" />
    <polygon points="42,35 32,45 44,48" fill="url(#lion-grad)" opacity="0.65" />
    <polygon points="58,35 68,45 56,48" fill="url(#lion-grad)" opacity="0.75" />

    <!-- Crown / Ears Peak -->
    <polygon points="50,18 38,12 42,35" fill="url(#lion-grad)" opacity="0.7" />
    <polygon points="50,18 62,12 58,35" fill="url(#lion-grad)" opacity="0.85" />

    <!-- Eyes (Glowing Tech Cyan) -->
    <polygon points="41,47 46,49 43,51" fill="url(#glow-grad)" />
    <polygon points="59,47 54,49 57,51" fill="url(#glow-grad)" />

    <!-- Cheeks & Snout Bridge -->
    <polygon points="50,48 44,48 40,60 50,68" fill="url(#lion-grad)" opacity="0.85" />
    <polygon points="50,48 56,48 60,60 50,68" fill="url(#lion-grad)" opacity="0.95" />

    <!-- Nose (Center focal point) -->
    <polygon points="50,68 45,60 55,60" fill="url(#glow-grad)" />
    <polygon points="50,68 47,74 53,74" fill="url(#glow-grad)" opacity="0.9" />

    <!-- Jaw / Chin -->
    <polygon points="50,68 40,60 38,72 50,82" fill="url(#lion-grad)" opacity="0.7" />
    <polygon points="50,68 60,60 62,72 50,82" fill="url(#lion-grad)" opacity="0.8" />
    <polygon points="50,82 45,74 50,68" fill="url(#glow-grad)" opacity="0.3" />
    <polygon points="50,82 55,74 50,68" fill="url(#glow-grad)" opacity="0.4" />
  </g>
</svg>
